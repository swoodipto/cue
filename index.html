<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="theme-color" content="#1a1a1a" />
        <link rel="manifest" href="manifest.json" />
        <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%231a1a1a' width='192' height='192'/><text x='50%' y='50%' font-size='120' font-weight='bold' fill='%23ffffff' text-anchor='middle' dominant-baseline='central' font-family='system-ui'>ꕥ</text></svg>" />
        <title>cue — image mockups</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <!-- ── Header ──────────────────────────────────────────── -->
        <!-- <header class="header">
            <div class="logo">
                <span class="logo-mark">ꕥ</span>
                <span class="logo-text">Cue.</span>
            </div>
            <span class="header-tagline">beautiful image mockups.</span>
        </header> -->

        <main class="layout">
            <!-- CENTER: Preview area -->
            <!-- Before image → upload UI  |  After image → canvas -->
            <div class="preview-area" id="previewArea">

                <!-- Empty state: upload UI (hidden when image is loaded) -->
                <div class="empty-state" id="emptyState">

                    <div class="upload-zone" id="uploadZone">
                        <input
                            type="file"
                            id="fileInput"
                            accept="image/png,image/jpeg,image/webp"
                            hidden
                        />
                        <div class="upload-icon">↑</div>
                        <p class="upload-title">Drop image here</p>
                        <p class="upload-sub">
                            or
                            <button class="link-btn" id="browseBtn">
                                browse files
                            </button>
                        </p>
                        <p class="upload-formats">PNG · JPG · WEBP</p>
                        <p class="upload-paste">or paste an image / URL &nbsp;—&nbsp; ⌘V</p>
                        </div>

                </div>

                <!-- Canvas frame (shown when image is loaded) -->
                <div class="frame-wrap hidden" id="frameWrap">
                    <div class="frame">
                        <canvas id="previewCanvas"></canvas>
                    </div>
                    <!--<p class="frame-hint">Live preview · 2× export</p>-->
                </div>

            </div>

            <!-- RIGHT: Controls panel (hidden until first image is loaded) -->
            <aside class="panel hidden" id="panel">

                <section class="panel-section rowing" id="section-header">
                    <div class="logo">
                        <span class="logo-mark">ꕥ</span>
                        <span class="logo-text">Cue</span>
                    </div>
                    <span class="header-tagline">image_mockups.png</span>
                </section>

                <!-- ── Appearance (hidden until image loaded) ─────── -->
                <section class="panel-section hidden" id="section-style">
                    <p class="section-label">Appearance</p>

                    <!-- Canvas size -->
                    <div class="control-group">
                        <span class="control-label">Canvas</span>
                        <div class="chip-row" id="ratioPicker">
                            <button class="chip active" data-ratio="free">Free</button>
                            <button class="chip" data-ratio="4:3">4:3</button>
                            <button class="chip" data-ratio="16:9">16:9</button>
                            <button class="chip" data-ratio="1:1">1:1</button>
                            <button class="chip" data-ratio="9:16">9:16</button>
                            <button class="chip" data-ratio="3:4">3:4</button>
                        </div>
                    </div>

                    <!-- Background type + colour/blur -->
                    <div class="control-group">
                        <span class="control-label">Background</span>
                        <div class="chip-row" id="bgTypePicker">
                            <button class="chip active" data-bg-type="solid">Solid</button>
                            <button class="chip" data-bg-type="blur">Blur</button>
                        </div>
                    </div>

                    <!-- Background colour (only shown when solid) -->
                    <div class="control-group" id="bgColorControl">
                        <div class="control-row">
                            <span class="control-label">Color</span>
                            <input
                                type="color"
                                id="bgColorInput"
                                class="color-swatch"
                                value="#ffffff"
                                title="Pick background color"
                            />
                        </div>
                    </div>

                    <!-- Blur amount slider (only shown when blur background) -->
                    <div class="control-group hidden" id="bgBlurControl">
                        <div class="control-row">
                            <span class="control-label">Blur amount</span>
                            <span class="val-group">
                                <input
                                    type="number"
                                    class="control-val"
                                    id="blurVal"
                                    value="20"
                                    min="4"
                                    max="80"
                                    step="2"
                                />
                                <span class="control-unit">px</span>
                            </span>
                        </div>
                        <input
                            type="range"
                            class="slider"
                            id="blurSlider"
                            min="4"
                            max="80"
                            value="20"
                            step="2"
                        />
                    </div>

                    <!-- Pattern -->
                    <div class="control-group">
                        <span class="control-label">Pattern</span>
                        <div class="chip-row" id="patternPicker">
                            <button class="chip active" data-pattern="none">None</button>
                            <button class="chip" data-pattern="noise">Noise</button>
                            <button class="chip" data-pattern="dots">Dots</button>
                        </div>
                    </div>

                    <!-- Pattern scale slider (only shown when noise or dots) -->
                    <div class="control-group hidden" id="patternScaleControl">
                        <div class="control-row">
                            <span class="control-label">Scale</span>
                            <span class="val-group">
                                <input
                                    type="number"
                                    class="control-val"
                                    id="patternScaleVal"
                                    value="10"
                                    min="1"
                                    max="100"
                                    step="1"
                                />
                                <span class="control-unit">×</span>
                            </span>
                        </div>
                        <input
                            type="range"
                            class="slider"
                            id="patternScaleSlider"
                            min="1"
                            max="100"
                            value="10"
                            step="1"
                        />
                    </div>

                    <!-- Pattern blend mode (only shown when noise or dots) -->
                    <div class="control-group hidden" id="patternBlendControl">
                        <span class="control-label">Blend</span>
                        <div class="chip-row" id="patternBlendPicker">
                            <button class="chip active" data-blend="normal">Normal</button>
                            <button class="chip" data-blend="overlay">Overlay</button>
                            <button class="chip" data-blend="screen">Screen</button>
                        </div>
                    </div>

                    <!-- Pattern opacity slider (only shown when noise or dots) -->
                    <div class="control-group hidden" id="patternOpacityControl">
                        <div class="control-row">
                            <span class="control-label">Opacity</span>
                            <span class="val-group">
                                <input
                                    type="number"
                                    class="control-val"
                                    id="patternOpacityVal"
                                    value="50"
                                    min="1"
                                    max="100"
                                    step="1"
                                />
                                <span class="control-unit"></span>
                            </span>
                        </div>
                        <input
                            type="range"
                            class="slider"
                            id="patternOpacitySlider"
                            min="1"
                            max="100"
                            value="50"
                            step="1"
                        />
                    </div>

                    <!-- Padding slider -->
                    <div class="control-group">
                        <div class="control-row">
                            <span class="control-label">Padding</span>
                            <span class="val-group">
                                <input
                                    type="number"
                                    class="control-val"
                                    id="paddingVal"
                                    value="60"
                                    min="0"
                                    max="120"
                                    step="4"
                                />
                                <span class="control-unit">px</span>
                            </span>
                        </div>
                        <input
                            type="range"
                            class="slider"
                            id="paddingSlider"
                            min="0"
                            max="120"
                            value="60"
                            step="4"
                        />
                    </div>

                    <!-- Corner radius slider -->
                    <div class="control-group">
                        <div class="control-row">
                            <span class="control-label">Corner Radius</span>
                            <span class="val-group">
                                <input
                                    type="number"
                                    class="control-val"
                                    id="radiusVal"
                                    value="18"
                                    min="0"
                                    max="60"
                                    step="1"
                                />
                                <span class="control-unit">px</span>
                            </span>
                        </div>
                        <input
                            type="range"
                            class="slider"
                            id="radiusSlider"
                            min="0"
                            max="60"
                            value="18"
                            step="1"
                        />
                    </div>

                    <!-- Shadow slider -->
                    <div class="control-group">
                        <div class="control-row">
                            <span class="control-label">Shadow</span>
                            <span class="val-group">
                                <input
                                    type="number"
                                    class="control-val"
                                    id="shadowVal"
                                    value="40"
                                    min="0"
                                    max="100"
                                    step="1"
                                />
                                <span class="control-unit">%</span>
                            </span>
                        </div>
                        <input
                            type="range"
                            class="slider"
                            id="shadowSlider"
                            min="0"
                            max="100"
                            value="40"
                            step="1"
                        />
                    </div>
                </section>

                <!-- ── Export (hidden until image loaded) ─────────── -->
                <section class="panel-section hidden" id="section-export">
                    <p class="section-label">Export</p>
                    <div class="export-row">
                        <button class="export-btn" id="exportBtn">
                            <span class="export-icon">
                                <svg viewBox="0 -2 14 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M1 10L7 16M7 16L13 10M7 16L7 1" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
                                </svg>
                            </span>
                            Download PNG
                        </button>
                        <button
                            class="copy-btn"
                            id="copyBtn"
                            title="Copy to clipboard"
                        >
                            <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M10.8999 3.89999C10.8999 2.96811 10.8999 2.50217 10.7477 2.13463C10.5447 1.64457 10.1553 1.25522 9.66527 1.05223C9.29773 0.899994 8.83179 0.899994 7.8999 0.899994H4.8999C3.01428 0.899994 2.07148 0.899994 1.48569 1.48578C0.899902 2.07157 0.899902 3.01438 0.899902 4.89999V7.89999C0.899902 8.83188 0.899902 9.29782 1.05214 9.66536C1.25513 10.1554 1.64448 10.5448 2.13454 10.7478C2.50208 10.9 2.96802 10.9 3.8999 10.9" stroke="#222222" stroke-width="1.8"/>
                            <rect x="6.8999" y="6.89999" width="10" height="10" rx="2" stroke="#222222" stroke-width="1.8"/>
                            </svg>

                        </button>
                    </div>
                    <p class="export-note">2× resolution · No watermark</p>
                </section>

                <section class="panel-section bottom" id="section-danger">
                    <button class="reset-btn hidden" id="resetBtn" title="Start over with a new image">
                        <svg width="16" height="20" viewBox="0 0 16 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M7.00348 8.62756L9.83191 3.72858L4.93293 0.900155" stroke="#222222" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M13.9622 7.74622C14.7553 9.11985 15.0583 10.7221 14.8217 12.2905C14.5851 13.8589 13.8228 15.3004 12.6598 16.3789C11.4968 17.4574 10.0019 18.109 8.42017 18.2269C6.83842 18.3447 5.26354 17.9219 3.95351 17.0277C2.64349 16.1334 1.67601 14.8208 1.20956 13.3048C0.743108 11.7888 0.805348 10.1593 1.38608 8.6833C1.96681 7.2073 3.03161 5.97229 4.40603 5.18058C5.78045 4.38887 7.383 4.08741 8.95115 4.32559" stroke="#222222" stroke-width="1.8" stroke-linecap="round"/>
                        </svg> <span>Reset</span>
                    </button>
                </section>

            </aside>
        </main>

        <div class="toast-container">
            <div class="toast" id="toast"></div>
        </div>
        <script src="app.js"></script>
        <script>
          // Register service worker for offline support
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
              .then(reg => {
                console.log('✓ Service Worker registered', reg);
              })
              .catch(err => {
                console.error('✗ Service Worker registration failed:', err);
              });
          } else {
            console.warn('Service Workers not supported');
          }
        </script>
        <!-- Google tag (gtag.js) -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-35EQV532NY"></script>
        <script>
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());

          gtag('config', 'G-35EQV532NY');
        </script>
    </body>
</html>
